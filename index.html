<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wi-Fi Connect</title>

  <link rel="icon" type="image/svg+xml" href="icons/fav/favicon_droid_round_smirk.svg">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/weather.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <div class="weather-bg" id="weatherBg"></div>

  <button class="admin-toggle" id="btnAdminToggle" aria-label="Открыть настройки">
    ⚙️
  </button>

  <main class="wrapper">

    <header class="hero">
      <div class="welcome" id="welcomeText">
        Добро пожаловать! Чувствуй себя как дома 🧡
      </div>

      <h1 class="page-title">
        Подключение к Wi-Fi
      </h1>
    </header>

    <section class="card">

      <!-- CAROUSEL -->
      <section class="carousel-shell">

        <div class="carousel" id="carousel">

          <div class="track" id="track">

            <article class="slide" data-net="r2d5">
              <div class="slide-card">
                <div class="slide-inner">

                  <img src="icons/icon_r2d5.svg" alt="Wi-Fi сеть 5GHz">

                  <div class="slide-frequency">5 GHz</div>

                </div>
              </div>
            </article>

            <article class="slide" data-net="r2d2">
              <div class="slide-card">
                <div class="slide-inner">

                  <img src="icons/icon_r2d2.svg" alt="Wi-Fi сеть 2.4GHz">

                  <div class="slide-frequency">2.4 GHz</div>

                </div>
              </div>
            </article>

          </div>

          <button class="nav-arrow left" id="btnPrev" aria-label="Предыдущая сеть">
            <img src="icons/arrow_left.svg" alt="">
          </button>

          <button class="nav-arrow right" id="btnNext" aria-label="Следующая сеть">
            <img src="icons/arrow_right.svg" alt="">
          </button>

        </div>

      </section>

      <!-- DOTS -->
      <div class="dots" id="dots">
        <span class="active"></span>
        <span></span>
      </div>

      <!-- ACTION BUTTONS -->
      <section class="actions-wrap">
        <div class="actions">

          <button
            class="action-btn"
            id="btnAutoConnect"
            aria-label="Подключиться"
            data-tip="Подключиться"
          >
            <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12.5a10 10 0 0 1 14 0"/>
              <path d="M8.5 16a5 5 0 0 1 7 0"/>
              <path d="M12 20h.01"/>
            </svg>
          </button>

          <button
            class="action-btn"
            id="copyBtn"
            aria-label="Скопировать пароль"
            data-tip="Скопировать пароль"
          >
            <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="10" height="10" rx="2"/>
              <rect x="5" y="5" width="10" height="10" rx="2"/>
            </svg>
          </button>

          <a
            class="action-btn"
            id="mapBtn"
            aria-label="Открыть карту"
            data-tip="Открыть карту"
          >
            <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21s6-5.5 6-11a6 6 0 1 0-12 0c0 5.5 6 11 6 11z"/>
              <circle cx="12" cy="10" r="2"/>
            </svg>
          </a>

        </div>
      </section>

      <!-- CONNECTED -->
      <div class="connected-banner" id="connectedBanner">
        <span>📶 Вы уже подключены к сети Wi-Fi</span>
      </div>

      <!-- WEATHER + SPEED -->
      <section class="bottom-section">

        <div class="super-card" id="superCard">

         <div class="super-top">

  <!-- LEFT COLUMN -->
  <div class="super-left-col">

    <div class="super-city" id="superCity"></div>

    <div class="super-date" id="superDate"></div>

    <div class="super-temp" id="superTemp"></div>

    <div class="super-meta" id="superMeta"></div>

  </div>

  <!-- CENTER CLOCK -->
  <div class="super-center">

    <div class="super-clock" id="superClock">
      <div class="clock-face">

        <div class="clock-mark m12"></div>
        <div class="clock-mark m3"></div>
        <div class="clock-mark m6"></div>
        <div class="clock-mark m9"></div>

        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>

        <div class="clock-dot"></div>

      </div>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="super-right-col">

  <div class="super-cond" id="superCond"></div>

  <!-- HUMIDITY -->
  <div class="super-stat">
    <span class="stat-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3s6 6.2 6 10a6 6 0 1 1-12 0c0-3.8 6-10 6-10z"/>
      </svg>
    </span>
    <span class="stat-text" id="superHumidity"></span>
  </div>

  <!-- WIND -->
  <div class="super-stat">
    <span class="stat-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8h10a3 3 0 1 0-3-3"/>
        <path d="M2 12h15a3 3 0 1 1-3 3"/>
        <path d="M4 16h8"/>
      </svg>
    </span>
    <span class="stat-text" id="superWind"></span>
  </div>

  <!-- PRESSURE -->
  <div class="super-stat">
    <span class="stat-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 14a7 7 0 1 1 14 0"/>
        <path d="M12 14l4-4"/>
        <path d="M8 18h8"/>
      </svg>
    </span>
    <span class="stat-text" id="superPressure"></span>
  </div>

</div>

          <div class="super-divider"></div>

          <div class="super-speed-row">
            <span>Download</span>
            <span id="superDown">—</span>
          </div>

          <div class="super-speed-row">
            <span>Upload</span>
            <span id="superUp">—</span>
          </div>

          <div class="super-speed-row">
            <span>Ping</span>
            <span id="superPing">— ms</span>
          </div>

          <div class="super-status" id="superStatus">
            Измерение…
          </div>

        </div>

      </section>

    </section>

  </main>

  <!-- ADMIN PANEL -->
  <aside class="admin-panel" id="adminPanel">

    <div class="admin-backdrop" id="btnAdminBackdrop"></div>

    <div class="admin-inner">

      <button class="admin-close" id="btnAdminClose" aria-label="Закрыть">
        ✕
      </button>

      <h2>Настройки для хозяина</h2>

      <div class="admin-row">
        <label for="admWelcome">Приветствие</label>
        <input id="admWelcome" type="text" placeholder="Добро пожаловать!">
      </div>

      <div class="admin-row">
        <label for="admSsid5">Имя сети 5 GHz</label>
        <input id="admSsid5" type="text" placeholder="r2d5">
      </div>

      <div class="admin-row">
        <label for="admSsid24">Имя сети 2.4 GHz</label>
        <input id="admSsid24" type="text" placeholder="r2d2">
      </div>

      <div class="admin-row">
        <label for="admPass">Пароль Wi-Fi</label>
        <input id="admPass" type="text" placeholder="Пароль">
      </div>

      <div class="admin-actions">
        <button class="admin-btn reset" id="btnAdminReset">Сбросить</button>
        <button class="admin-btn save" id="btnAdminSave">Сохранить</button>
      </div>

    </div>

  </aside>

  <script type="module" src="js/app.js"></script>

</body>
</html>
