<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Быстрое подключение гостей к домашнему Wi‑Fi" />
  <meta name="theme-color" content="#111111" />
  <title>Wi‑Fi Connect</title>
  <link rel="icon" type="image/svg+xml" href="icons/fav/favicon_droid_round_smirk.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/00-reset.css" />
  <link rel="stylesheet" href="css/01-tokens.css" />
  <link rel="stylesheet" href="css/02-layout.css" />
  <link rel="stylesheet" href="css/03-components.css" />
  <link rel="stylesheet" href="css/04-base.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <canvas id="skyCanvas" class="sky-canvas" aria-hidden="true"></canvas>
  <div class="app-root">
    <main class="wrapper" id="mainContent">
      <header class="hero">
        <p class="welcome" id="welcomeText">Добро пожаловать! Чувствуй себя как дома 🧡</p>
        <h1 class="page-title">Подключение к Wi‑Fi</h1>
      </header>
      <section class="card" aria-labelledby="wifiSectionTitle">
        <h2 id="wifiSectionTitle" class="sr-only">Выбор сети Wi‑Fi</h2>
        <section class="carousel-shell">
          <div class="carousel" id="carousel" aria-live="polite">
            <div class="track" id="track">
              <article class="slide" data-net="r2d5" aria-label="Сеть 5 GHz">
                <div class="slide-card"><div class="slide-inner">
                  <img src="icons/icon_r2d5.svg" alt="Wi‑Fi 5 GHz" loading="lazy" />
                  <div class="slide-frequency">5 GHz</div>
                </div></div>
              </article>
              <article class="slide" data-net="r2d2" aria-label="Сеть 2.4 GHz">
                <div class="slide-card"><div class="slide-inner">
                  <img src="icons/icon_r2d2.svg" alt="Wi‑Fi 2.4 GHz" loading="lazy" />
                  <div class="slide-frequency">2.4 GHz</div>
                </div></div>
              </article>
            </div>
            <button class="nav-arrow left" id="btn-prev" type="button" aria-label="Предыдущая сеть">‹</button>
            <button class="nav-arrow right" id="btn-next" type="button" aria-label="Следующая сеть">›</button>
          </div>
        </section>
        <div class="dots" id="dots" aria-label="Индикатор слайдов"></div>
        <!-- ACTION BUTTONS -->
<section class="actions-wrap" aria-label="Действия">
  <div class="actions">

    <button
      class="action-btn"
      id="btn-auto-connect"
      data-tip="Подключить Wi‑Fi"
      type="button"
      aria-label="Автоподключение"
    >
      <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8.5C7.5 4 16.5 4 22 8.5"/>
        <path d="M5 12c4-3 10-3 14 0"/>
        <path d="M8.5 15.5c2-1.5 5-1.5 7 0"/>
        <circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <button
      class="action-btn"
      id="btn-copy"
      data-tip="Скопировать пароль"
      type="button"
      aria-label="Скопировать пароль"
    >
      <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="10" height="10" rx="2"/>
        <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>

    <button
      class="action-btn"
      id="btn-map"
      data-tip="Открыть карту"
      type="button"
      aria-label="Открыть карту"
    >
      <svg viewBox="0 0 24 24" class="btn-icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s6-5.4 6-11a6 6 0 1 0-12 0c0 5.6 6 11 6 11z"/>
        <circle cx="12" cy="10" r="2.2"/>
      </svg>
    </button>

  </div>
</section>
        <div class="status-banner" id="status-banner" role="status" aria-live="polite">📶 Вы уже подключены к сети Wi‑Fi</div>
        <section class="bottom-section" aria-label="Погода и скорость интернета">
          <div class="weather-card" id="weather-card">
            <div class="weather-top">
              <div class="weather-left">
                <div id="weather-city">Киев</div>
                <div id="weather-date">...</div>
                <div id="weather-temp">--°</div>
                <div id="weather-meta">...</div>
              </div>
              <div class="weather-center">
                <div class="weather-clock">
                  <svg class="clock-svg" viewBox="0 0 100 100" id="clockSvg"></svg>
                  <div id="hourHand" class="hand hour-hand"></div>
                  <div id="minuteHand" class="hand minute-hand"></div>
                  <div id="secondHand" class="hand second-hand"></div>
                  <div class="clock-center"></div>
                </div>
              </div>
              <div class="weather-right">
                <div id="weather-cond">...</div>
                <div id="weather-humidity">--%</div>
                <div id="weather-wind">--</div>
                <div id="weather-pressure">--</div>
              </div>
            </div>
            <div class="weather-divider"></div>
            <div class="weather-bottom">
              <div id="weather-down">--</div>
              <div id="weather-up">--</div>
              <div id="weather-ping">--</div>
              <div id="weather-status">...</div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <aside class="admin-panel" id="admin-panel" aria-labelledby="admin-title" aria-hidden="true">
    <div class="admin-inner">
      <h2 id="admin-title">Настройки</h2>
      <label for="admin-welcome">Приветствие</label>
      <input id="admin-welcome" placeholder="Приветствие" autocomplete="off" />
      <label for="admin-ssid-5">Сеть 5 GHz</label>
      <input id="admin-ssid-5" placeholder="5 GHz" autocomplete="off" />
      <label for="admin-ssid-24">Сеть 2.4 GHz</label>
      <input id="admin-ssid-24" placeholder="2.4 GHz" autocomplete="off" />
      <label for="admin-pass">Пароль</label>
      <input id="admin-pass" placeholder="Пароль" autocomplete="off" />
      <button id="btn-admin-save" type="button">Сохранить</button>
    </div>
  </aside>
  <script defer src="https://cdn.babylonjs.com/babylon.js"></script>
  <script defer src="js/debug-time.js"></script>
  <script type="module" src="js/app.js"></script>
  <script defer src="js/tooltips.js"></script>
</body>
</html>
