<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wi-Fi Connect</title>

  <!-- Иконка -->
  <link rel="icon" type="image/svg+xml" href="icons/fav/favicon_droid_round_smirk.svg">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- CSS-файлы (в правильном порядке) -->
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/carousel.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/weather.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/main.css">

</head>

<body>

  <!-- Погодный фон -->
  <div class="weather-bg" id="weatherBg"></div>

  <!-- Кнопка админки -->
  <div class="admin-toggle" id="btnAdminToggle">⚙️</div>

  <div class="wrapper">
    <div class="welcome" id="welcomeText">Добро пожаловать! Чувствуй себя как дома 🧡</div>
    <h1>Подключение к Wi-Fi</h1>

    <div class="card">

      <!-- КАРУСЕЛЬ -->
      <div class="carousel-shell">
        <div class="carousel" id="carousel">
          <div class="track" id="track">

            <!-- 5 GHz -->
            <div class="slide" data-net="r2d5">
              <div class="slide-card">
                <div class="slide-inner">
                  <img src="icons/icon_r2d5.svg" alt="r2d5">
                  <div class="slide-ssid-main">r2d5</div>
                  <div class="slide-ssid-sub">5 GHz</div>
                </div>
                <div class="slide-caption">
                  r2d5 · быстрее, если поддерживается
                </div>
              </div>
            </div>

            <!-- 2.4 GHz -->
            <div class="slide" data-net="r2d2">
              <div class="slide-card">
                <div class="slide-inner">
                  <img src="icons/icon_r2d2.svg" alt="r2d2">
                  <div class="slide-ssid-main">r2d2</div>
                  <div class="slide-ssid-sub">2.4 GHz</div>
                </div>
                <div class="slide-caption">
                  r2d2 · стабильнее на расстоянии
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- стрелки -->
        <div class="nav-arrow left" id="btnPrev">
          <img src="icons/arrow_left.svg" alt="">
        </div>
        <div class="nav-arrow right" id="btnNext">
          <img src="icons/arrow_right.svg" alt="">
        </div>
      </div>

      <!-- точки -->
      <div class="dots" id="dots">
        <span class="active"></span>
        <span></span>
      </div>

      <!-- кнопки -->
      <button class="btn" id="btnAutoConnect">Подключиться автоматически (Android)</button>
      <button class="btn" id="btnCopyPass">Скопировать пароль</button>
      <button class="btn" id="btnOpenMaps">Как добраться 🚕</button>

      <!-- НЕОНОВАЯ ПЛАШКА -->
      <div class="connected-banner" id="connectedBanner">
        <span>📶 Вы уже подключены к сети Wi-Fi</span>
      </div>

      <!-- подписи -->
      
      <div class="status" id="netStatus"></div>

      <!-- нижний блок -->
      <div class="bottom-section">

        <!-- SUPER WEATHER + SPEED CARD -->
        <div class="super-card" id="superCard">

          <div class="super-top">
            <div class="super-city" id="superCity">Kyiv</div>
            <div class="super-cond" id="superCond">—</div>
          </div>

          <div class="super-temp" id="superTemp">—°C</div>
          <div class="super-meta" id="superMeta"></div>

          <div class="super-divider"></div>

          <div class="super-speed-row">
            <span>Download</span>
            <span id="superDown">—</span>
          </div>

          <div class="super-speed-row">
            <span>Upload</span>
            <span id="superUp">—</span>
          </div>

          <div class="super-speed-row">
            <span>Ping</span>
            <span id="superPing">— ms</span>
          </div>

          <div class="super-status" id="superStatus">Измерение…</div>

        </div>
      </div>

    </div>
  </div>

  <!-- Мини-админка -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-backdrop" id="btnAdminBackdrop"></div>
    <div class="admin-inner">
      <div class="admin-close" id="btnAdminClose">✕</div>
      <h2>Настройки для хозяина</h2>

      <div class="admin-row">
        <label for="admWelcome">Приветствие</label>
        <input id="admWelcome" type="text" placeholder="Добро пожаловать!">
      </div>

      <div class="admin-row">
        <label for="admSsid5">Имя сети 5 GHz</label>
        <input id="admSsid5" type="text" placeholder="r2d5">
      </div>

      <div class="admin-row">
        <label for="admSsid24">Имя сети 2.4 GHz</label>
        <input id="admSsid24" type="text" placeholder="r2d2">
      </div>

      <div class="admin-row">
        <label for="admPass">Пароль Wi-Fi</label>
        <input id="admPass" type="text" placeholder="Пароль">
      </div>

      <div class="admin-actions">
        <button class="admin-btn reset" id="btnAdminReset">Сбросить по умолчанию</button>
        <button class="admin-btn save" id="btnAdminSave">Сохранить</button>
      </div>

    </div>
  </div>

  <!-- Главный модуль -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
